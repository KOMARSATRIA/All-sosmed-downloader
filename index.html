<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosmed Video Downloader | All-in-One</title>
    <!-- FontAwesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Menghubungkan ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sosmed <span>Downloader</span></h1>
        <p class="subtitle">Unduh video dari TikTok, Douyin, YouTube, dan Instagram secara instan.</p>
        
        <!-- Platform Icons -->
        <div class="platform-icons">
            <i class="fab fa-tiktok" title="TikTok"></i>
            <i class="fab fa-instagram" title="Instagram"></i>
            <i class="fab fa-youtube" title="YouTube"></i>
            <i class="fa-solid fa-bolt" style="color: #00f2fe;" title="Douyin"></i>
        </div>

        <!-- Input Area -->
        <div class="input-group">
            <div class="input-wrapper">
                <i class="fa-solid fa-link"></i>
                <input type="text" id="videoUrl" placeholder="Tempel tautan video di sini..." autocomplete="off">
            </div>
            <button id="downloadBtn" onclick="processVideo()">
                <i class="fa-solid fa-cloud-arrow-down"></i> Ambil Video
            </button>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader"></div>

        <!-- Result Area -->
        <div class="result-box" id="resultBox">
            <!-- Tempat Pratinjau Gambar Video -->
            <img src="" id="videoPreview" class="video-preview" alt="Preview Video" style="width: 100%; max-height: 250px; border-radius: 12px; object-fit: cover; margin-bottom: 15px; background: #0f172a; display: none;">
            
            <p style="margin-bottom: 15px; font-weight: 600;" id="videoTitle">Video Berhasil Diproses!</p>
            
            <!-- Elemen tersembunyi untuk menyimpan URL video hasil API -->
            <input type="hidden" id="hiddenVideoUrl" value="">

            <div class="download-options">
                <!-- Tombol Download Video -->
                <button class="btn-dl" onclick="downloadFile()"><i class="fa-solid fa-download"></i> Download Video (No WM)</button>
                
                <!-- Link Audio -->
                <a href="#" id="dlAudio" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
                    <button style="background: #64748b; width: 100%;"><i class="fa-solid fa-music"></i> Download Audio / MP3</button>
                </a>
            </div>
        </div>
    </div>

    <!-- KODE IKLAN BANNER ADSTERRA -->
    <div class="ads-container">
        <script type="text/javascript">
          atOptions = {
            'key' : '36d59f973b23334ef7af9bb4dc23fd2a',
            'format' : 'iframe',
            'height' : 250,
            'width' : 300,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/36d59f973b23334ef7af9bb4dc23fd2a/invoke.js"></script>
    </div>

    <!-- BAGIAN FOOTER DENGAN TOMBOL DONASI & RUNNING TEXT -->
    <footer style="text-align: center; margin: 25px auto; font-family: 'Inter', sans-serif;">
        <!-- TAUTAN TOMBOL DONASI UTAMA (SILAKAN GANTI UJUNGNYA DENGAN USERNAME SAWERIAMU) -->
        <a href="https://saweria.co/MSATRIAY" target="_blank" rel="noopener noreferrer" style="text-decoration: none; display: inline-block;">
            <button style="background: linear-gradient(135deg, #ff4a5a, #ff6b6b); color: #fff; border: none; padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 74, 90, 0.3); display: flex; align-items: center; gap: 8px; margin: 0 auto 15px auto;">
                <i class="fa-solid fa-heart"></i> Contact Support (Donasi)
            </button>
        </a>

        <!-- IFRAME WIDGET RECENT DONATION (TETAP PAKAI STREAM KEY AGAR TEKS BERJALAN AKTIF) -->


        <p style="margin-top: 12px; font-size: 12px; color: #64748b; opacity: 0.8; letter-spacing: 0.5px;">&copy; by.mas.dev</p>
    </footer>

    <!-- Menghubungkan ke file JavaScript eksternal -->
    <script src="script.js"></script>
</body>
</html>
